<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">

  <div class="card shadow p-4">

    <h2 class="text-center mb-4">📝 Todo App</h2>

    <form method="POST" class="d-flex mb-3">
      {% csrf_token %}
      <input type="text" name="title" class="form-control me-2" placeholder="タスクを入力">
      <button class="btn btn-primary">追加</button>
    </form>

    <ul class="list-group">

      {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between align-items-center">

          <span>
            {% if task.done %}
              <del class="text-muted">{{ task.title }}</del>
            {% else %}
              {{ task.title }}
            {% endif %}
          </span>

          <div>
            <a href="{% url 'toggle_task' task.id %}" class="btn btn-success btn-sm">完了</a>
            <a href="{% url 'delete_task' task.id %}" class="btn btn-danger btn-sm">削除</a>
          </div>

        </li>
      {% endfor %}

    </ul>

  </div>

</div>

</body>
</html>
